<div style="margin:0;padding:0;background:#ffffff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',Arial,sans-serif;color:#102033;">
  <div style="padding:18px 18px 16px;border-bottom:1px solid #d8e4ef;background:#f1f7fc;">
    <div style="font-size:13px;color:#0d6ed6;margin-bottom:8px;font-weight:700;">米游签任务通知</div>
    <div style="font-size:23px;font-weight:800;line-height:1.3;color:#102033;">{{title}}</div>
    <div style="margin-top:12px;">
      <span style="display:inline-block;padding:5px 10px;border-radius:999px;background:{{status_bg}};color:{{status_color}};font-size:13px;font-weight:700;">{{status}}</span>
      <span style="margin-left:10px;color:#627389;font-size:13px;">{{time}}</span>
    </div>
  </div>
  <div style="padding:14px 18px 18px;">
    {{account_sections_html}}
  </div>
  <div style="padding:16px 18px 20px;border-top:1px solid #d8e4ef;background:#f1f7fc;">
    <div style="font-size:16px;font-weight:800;margin-bottom:10px;color:#102033;">详细日志</div>
    <pre style="white-space:pre-wrap;word-break:break-word;margin:0;padding:14px;border-radius:8px;background:#0d1d32;color:#dcecff;font-size:13px;line-height:1.6;font-family:Consolas,'SFMono-Regular',Menlo,monospace;">{{detail_html}}</pre>
  </div>
</div>
